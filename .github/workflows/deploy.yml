name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        env:
          APP_ENV: prod
        run: composer install --no-dev --optimize-autoloader --classmap-authoritative

      - name: Dump env for production
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: composer dump-env prod

      - run: php bin/console tailwind:build --minify
      - run: php bin/console asset-map:compile

      - run: sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USER }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/lftp-deploy.sh <<'LFTP_SCRIPT'
          set sftp:auto-confirm yes
          set sftp:connect-program "ssh -o StrictHostKeyChecking=no"
          set net:max-retries 3
          set net:timeout 60
          set mirror:parallel-transfer-count 4
          LFTP_SCRIPT

          # Append credentials (not in heredoc to allow variable expansion)
          echo "open -u \"${SFTP_USER}\",\"${SFTP_PASS}\" sftp://${SFTP_HOST}" >> /tmp/lftp-deploy.sh

          cat >> /tmp/lftp-deploy.sh <<'LFTP_MIRROR'
          mirror --reverse --delete --verbose \
            --exclude ^\.git/ \
            --exclude ^\.github/ \
            --exclude ^\.claude/ \
            --exclude ^\.env$ \
            --exclude ^\.env\.dev$ \
            --exclude ^\.env\.local$ \
            --exclude ^tests/ \
            --exclude ^var/ \
            --exclude ^CLAUDE\.md$ \
            --exclude ^README\.md$ \
            ./ /spajxo.cz/
          quit
          LFTP_MIRROR

          lftp -f /tmp/lftp-deploy.sh
