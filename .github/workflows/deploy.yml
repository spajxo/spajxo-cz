name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        env:
          APP_ENV: prod
        run: composer install --no-dev --optimize-autoloader --classmap-authoritative

      - name: Dump env for production
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: composer dump-env prod

      - run: php bin/console tailwind:build --minify
      - run: php bin/console asset-map:compile

      - run: sudo apt-get install -y -qq sshpass

      - name: Deploy via rsync over SSH
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SSH_HOST: ${{ secrets.FTP_HOST }}
          SSH_USER: ${{ secrets.FTP_USER }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.claude/' \
            --exclude '.env' \
            --exclude '.env.dev' \
            --exclude '.env.local' \
            --exclude 'tests/' \
            --exclude 'var/' \
            --exclude 'CLAUDE.md' \
            --exclude 'README.md' \
            ./ "${SSH_USER}@${SSH_HOST}:/spajxo.cz/"
