name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        env:
          APP_ENV: prod
        run: composer install --no-dev --optimize-autoloader --classmap-authoritative

      - name: Dump env for production
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: composer dump-env prod

      - run: php bin/console tailwind:build --minify
      - run: php bin/console asset-map:compile

      - name: SFTP Deploy
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './*'
          remote_path: /spajxo.cz/
          delete_remote_files: true
          rsyncArgs: '--exclude=.git --exclude=.github --exclude=.claude --exclude=.env --exclude=.env.dev --exclude=.env.local --exclude=tests --exclude=var --exclude=CLAUDE.md --exclude=README.md'
